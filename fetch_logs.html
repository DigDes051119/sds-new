<!DOCTYPE html>
<html>
<head><title>Fetch Logs</title></head>
<body>
<pre id="output">Loading...</pre>
<script>
const SUPABASE_URL = "https://hniqpnuqqsmqpolxgbav.supabase.co";
const SUPABASE_KEY = "sb_publishable_3DWLrcWUpjuE_gNKEivM8A_UHOmJLgu";
fetch(`${SUPABASE_URL}/rest/v1/sds_admin_logs?select=*&order=created_at.desc&limit=30`, {
  headers: {
    "apikey": SUPABASE_KEY,
    "Authorization": `Bearer ${SUPABASE_KEY}`
  }
})
.then(r => r.json())
.then(data => {
  document.getElementById('output').textContent = JSON.stringify(data, null, 2);
})
.catch(err => {
  document.getElementById('output').textContent = "Error: " + err.message;
});
</script>
</body>
</html>
